name: brightpay-takehome

x-dotnet-env: &dotnet-env
  DOTNET_CLI_HOME: /tmp/dotnet-home
  DOTNET_CLI_TELEMETRY_OPTOUT: "1"
  DOTNET_NOLOGO: "1"
  NUGET_PACKAGES: /tmp/nuget/packages

x-workspace-volumes: &workspace-volumes
  - .:/workspace
  - ./.docker-cache/dotnet-home:/tmp/dotnet-home
  - ./.docker-cache/nuget:/tmp/nuget/packages

services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-CU20-ubuntu-22.04
    container_name: ${DB_CONTAINER_NAME:-brightpay-takehome-db}
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: ${SQL_SERVER_PASSWORD:-BrightPay_takehome_Passw0rd!}
    ports:
      - "${SQL_HOST_PORT:-14333}:1433"
    volumes:
      - sql-data:/var/opt/mssql

  sdk:
    image: mcr.microsoft.com/dotnet/sdk:10.0.203
    user: "${HOST_UID:-1000}:${HOST_GID:-1000}"
    working_dir: /workspace
    environment:
      <<: *dotnet-env
      HOME: /tmp/dotnet-home
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Development}
      ConnectionStrings__CheckoutDatabase: Server=brightpay-takehome-db,1433;Database=BrightPayTakeHome;User Id=sa;Password=${SQL_SERVER_PASSWORD:-BrightPay_takehome_Passw0rd!};TrustServerCertificate=True
      DisableHttpsRedirection: "true"
      APP_PUBLIC_BASE_URL: http://localhost:${APP_HOST_PORT:-8080}
      APP_INTERNAL_BASE_URL: http://web:8080
      SQL_HOST_PORT: ${SQL_HOST_PORT:-14333}
      APP_HOST_PORT: ${APP_HOST_PORT:-8080}
    volumes: *workspace-volumes
    profiles:
      - tools

  web:
    image: mcr.microsoft.com/dotnet/sdk:10.0.203
    container_name: ${DEV_CONTAINER_NAME:-brightpay-takehome-web}
    user: "${HOST_UID:-1000}:${HOST_GID:-1000}"
    depends_on:
      - db
    working_dir: /workspace
    command:
      - dotnet
      - watch
      - --project
      - src/BrightPay.TakeHome.Web/BrightPay.TakeHome.Web.csproj
      - run
      - --no-launch-profile
      - --urls
      - http://0.0.0.0:8080
    environment:
      <<: *dotnet-env
      HOME: /tmp/dotnet-home
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Development}
      ConnectionStrings__CheckoutDatabase: Server=brightpay-takehome-db,1433;Database=BrightPayTakeHome;User Id=sa;Password=${SQL_SERVER_PASSWORD:-BrightPay_takehome_Passw0rd!};TrustServerCertificate=True
      DisableHttpsRedirection: "true"
      DOTNET_USE_POLLING_FILE_WATCHER: "1"
    ports:
      - "${APP_HOST_PORT:-8080}:8080"
    volumes: *workspace-volumes

  app:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      - db
    environment:
      ConnectionStrings__CheckoutDatabase: Server=brightpay-takehome-db,1433;Database=BrightPayTakeHome;User Id=sa;Password=${SQL_SERVER_PASSWORD:-BrightPay_takehome_Passw0rd!};TrustServerCertificate=True
      DisableHttpsRedirection: "true"
    expose:
      - "8080"
    networks:
      default:
        aliases:
          - checkout-web

  e2e:
    build:
      context: .
      dockerfile: Dockerfile.e2e
    user: "${HOST_UID:-1000}:${HOST_GID:-1000}"
    depends_on:
      - db
      - app
    working_dir: /src
    command:
      - ./scripts/run-compose-e2e.sh
    environment:
      # Non-interactive run: let pnpm purge a stale (bind-mounted) node_modules
      # without a TTY confirmation prompt instead of aborting the Lighthouse step.
      CI: "true"
      HOME: /tmp/e2e-home
      DOTNET_CLI_HOME: /tmp/e2e-home
      DOTNET_CLI_TELEMETRY_OPTOUT: "1"
      DOTNET_NOLOGO: "1"
      NUGET_PACKAGES: /tmp/nuget/packages
      E2E_BASE_URL: http://checkout-web:8080
      LHCI_BASE_URL: http://checkout-web:8080
      PNPM_HOME: /tmp/pnpm-home
      PNPM_STORE_DIR: /tmp/pnpm-store
      COREPACK_HOME: /tmp/e2e-home/corepack
      DOTNET_ROOT: /opt/dotnet
    volumes:
      - .:/src
      - ./.docker-cache/e2e-home:/tmp/e2e-home
      - ./.docker-cache/nuget:/tmp/nuget/packages
      - ./.docker-cache/pnpm-home:/tmp/pnpm-home
      - ./.docker-cache/pnpm-store:/tmp/pnpm-store

volumes:
  sql-data:
    name: brightpay-takehome-sql
