name: brightpay-takehome

services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-CU20-ubuntu-22.04
    container_name: ${DB_CONTAINER_NAME:-brightpay-takehome-db}
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: ${SQL_SERVER_PASSWORD:-BrightPay_takehome_Passw0rd!}
    ports:
      - "${SQL_HOST_PORT:-14333}:1433"
    volumes:
      - sql-data:/var/opt/mssql

  web:
    image: mcr.microsoft.com/dotnet/sdk:10.0.203
    container_name: ${DEV_CONTAINER_NAME:-brightpay-takehome-web}
    depends_on:
      - db
    working_dir: /workspace
    command:
      - dotnet
      - watch
      - --project
      - src/BrightPay.TakeHome.Web/BrightPay.TakeHome.Web.csproj
      - run
      - --no-launch-profile
      - --urls
      - http://0.0.0.0:8080
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Development}
      ConnectionStrings__CheckoutDatabase: Server=brightpay-takehome-db,1433;Database=BrightPayTakeHome;User Id=sa;Password=${SQL_SERVER_PASSWORD:-BrightPay_takehome_Passw0rd!};TrustServerCertificate=True
      DisableHttpsRedirection: "true"
      DOTNET_CLI_HOME: /tmp/dotnet-home
      DOTNET_CLI_TELEMETRY_OPTOUT: "1"
      DOTNET_NOLOGO: "1"
      DOTNET_USE_POLLING_FILE_WATCHER: "1"
    ports:
      - "${APP_HOST_PORT:-8080}:8080"
    volumes:
      - .:/workspace
      - nuget-cache:/workspace/.nuget/packages
      - dotnet-home:/tmp/dotnet-home

  app:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      - db
    environment:
      ConnectionStrings__CheckoutDatabase: Server=brightpay-takehome-db,1433;Database=BrightPayTakeHome;User Id=sa;Password=${SQL_SERVER_PASSWORD:-BrightPay_takehome_Passw0rd!};TrustServerCertificate=True
      DisableHttpsRedirection: "true"
    expose:
      - "8080"
    networks:
      default:
        aliases:
          - checkout-web

  e2e:
    image: mcr.microsoft.com/playwright:v1.60.0-noble
    depends_on:
      - db
      - app
    working_dir: /src
    command:
      - ./scripts/run-compose-e2e.sh
    environment:
      E2E_BASE_URL: http://checkout-web:8080
      LHCI_BASE_URL: http://checkout-web:8080
      CHROME_PATH: /ms-playwright/chromium-1223/chrome-linux64/chrome
      PNPM_HOME: /pnpm
    volumes:
      - .:/src
      - nuget-cache:/src/.nuget/packages
      - e2e-dotnet:/opt/dotnet
      - pnpm-store:/pnpm/store

volumes:
  sql-data:
    name: brightpay-takehome-sql
  nuget-cache:
    name: brightpay-takehome-nuget
  dotnet-home:
    name: brightpay-takehome-dotnet-home
  e2e-dotnet:
    name: brightpay-takehome-e2e-dotnet
  pnpm-store:
    name: brightpay-takehome-pnpm-store
