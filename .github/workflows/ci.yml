name: ci

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  toolchain:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Check toolchain version pins
        run: dotnet run --project tools/BrightPay.TakeHome.Tooling -- check-toolchain

  build-test:
    runs-on: ubuntu-latest
    needs: toolchain

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore BrightPay.TakeHome.slnx

      - name: Check formatting
        run: dotnet format BrightPay.TakeHome.slnx --verify-no-changes

      - name: Build
        run: dotnet build BrightPay.TakeHome.slnx --configuration Release --no-restore

      - name: Test
        run: |
          dotnet test tests/BrightPay.TakeHome.Tests.Unit/BrightPay.TakeHome.Tests.Unit.csproj --configuration Release --no-build
          dotnet test tests/BrightPay.TakeHome.Tests.Components/BrightPay.TakeHome.Tests.Components.csproj --configuration Release --no-build

      - name: Publish web app
        run: dotnet publish src/BrightPay.TakeHome.Web/BrightPay.TakeHome.Web.csproj --configuration Release --no-build --output artifacts/web

      - name: Upload web artifact
        uses: actions/upload-artifact@v4
        with:
          name: web
          path: artifacts/web

  e2e:
    runs-on: ubuntu-latest
    needs: toolchain

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Start application
        run: docker compose up --detach --build db app

      - name: Run E2E smoke tests
        run: docker compose run --rm e2e

      - name: Tear down
        if: always()
        run: docker compose down --volumes

  infra:
    runs-on: ubuntu-latest
    needs: toolchain

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up OpenTofu
        uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: 1.12.3

      - name: Check OpenTofu formatting
        run: tofu -chdir=infra/opentofu fmt -check -recursive

      - name: Initialize OpenTofu
        run: tofu -chdir=infra/opentofu init -backend=false

      - name: Validate OpenTofu
        run: tofu -chdir=infra/opentofu validate
